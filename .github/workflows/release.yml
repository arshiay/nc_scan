name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            target: bun-darwin-arm64
            outfile: ncscan_darwin_arm64

          - name: macOS x64
            target: bun-darwin-x64
            outfile: ncscan_darwin_x64

          - name: Linux ARM64
            target: bun-linux-arm64
            outfile: ncscan_linux_arm64

          - name: Linux x64
            target: bun-linux-x64
            outfile: ncscan_linux_x64

          - name: Windows ARM64
            target: bun-windows-arm64
            outfile: ncscan_windows_arm64.exe

          - name: Windows x64
            target: bun-windows-x64
            outfile: ncscan_windows_x64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p out
          bun build index.tsx --compile --outfile=./out/${{ matrix.outfile }} --target=${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.outfile }}
          path: out/${{ matrix.outfile }}
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
